[model]
name = Blog Post
label = {{ this.title }}
hidden = yes

[fields.title]
label = Title
type = string

[fields.pub_date]
label = Publication date
type = date

[fields.teaser]
label = Teaser for homepage
type = markdown

[fields.cta]
label = CTA for homepage
type = string

[fields.body]
label = Body
type = markdown

[fields.show_on_homepage]
label = Show on Homepage
type = boolean
default = False

[fields.category]
label = Blog Post Category: PR|community
type = string

