{% extends "layout.html" %}

{% block title %}{{ this.title }}{% endblock %}

{% block body %}

<h1>{{ this.title }}</h1>

{% if this.intro %}
{{ this.intro }}
{% endif %}

<ol class="content-list">
    {% for child in this.children %}
    <li class="blog-post">
        <a href="{{ child|url }}">
            <div class="usp-text">
                <h2>{{ child.title }}</h2>
                <div>{{ child.teaser }}</div>
            </div>
        </a>
    </li>
    {% endfor %}
</ol>

{% endblock %}
