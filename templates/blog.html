{% extends "layout.html" %}
{% from "macros/blog.html" import render_blog_post %}

{% block title %}{{ this.title }}{% endblock %}

{% block body %}

<ol class="content-list">
    {% for child in this.children %}
    <li class="blog-post">
        {{ render_blog_post(child, from_index=true) }}
    </li>
    {% endfor %}
</ol>

{% endblock %}
