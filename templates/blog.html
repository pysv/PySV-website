{% extends "layout.html" %}
{% from "macros/blog.html" import render_blog_post_in_list %}

{% block title %}{{ this.title }}{% endblock %}

{% block body %}

<ol class="content-list">
    {% for child in this.children %}
    <li class="blog-post">
        <a href="{{child|url}}">
            {{ render_blog_post_in_list(child) }}
        </a>
    </li>
    {% endfor %}
</ol>

{% endblock %}
