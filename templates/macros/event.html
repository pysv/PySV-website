{% macro render_event(event) %}
<div class="details">
    <h2>{{ event.title }}</h2>
    <h3>{{ event.start_date|dateformat('d.MM.YYYY')}} - {{ event.end_date|dateformat('d.MM.YYYY') }}</h3>
</div>

<div class="image">
    <img src="{{ (event.path ~ '/' ~ event.logo)|url }}" alt="{{ event.title }}">
</div>

<p>{{ event.body }}</p>
{% endmacro %}
