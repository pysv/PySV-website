{% macro render_board_member(member, alt) %}
<li class="board-member">
    <div class="image">
        <img src="{{ ('/board/' ~ member.image)|url }}" alt="{{member.name}}">
    </div>
    <div class="details">
        <h3>{{ member.name }}</h3>
        <h4>{{ member.role }}</h4>
        {% if member.bio and member.bio[alt] %}
        <p class="bio">{{ member.bio[alt] }}</p>
        {% endif %}
    </div>
</li>
{% endmacro %}
